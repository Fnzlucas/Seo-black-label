<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blacklabel — SEO Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #f5f5f0; --gold: #c9a84c;
    --gold-dim: #8a6e2e; --red: #e03333; --green: #2ecc71;
    --panel: #111111; --border: #222;
  }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 2rem 3rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.5rem; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.15em; }
  header span { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 0.2em; color: var(--gold); background: rgba(201,168,76,0.08); border: 1px solid var(--gold-dim); padding: 0.3rem 0.8rem; border-radius: 2px; }
  main { flex: 1; display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 90px); }
  .config { background: var(--panel); border-right: 1px solid var(--border); padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field label { font-size: 0.78rem; color: #888; }
  .field input { background: #1a1a1a; border: 1px solid var(--border); color: var(--white); padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--gold-dim); }
  .field input::placeholder { color: #444; }
  .divider { border: none; border-top: 1px solid var(--border); }
  .btn-start { background: var(--gold); color: var(--black); border: none; padding: 1rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em; cursor: pointer; border-radius: 4px; transition: background 0.2s; width: 100%; }
  .btn-start:hover { background: #d4b060; }
  .btn-start:disabled { background: #444; color: #777; cursor: not-allowed; }
  .btn-stop { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 0.75rem; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.15em; cursor: pointer; border-radius: 4px; width: 100%; display: none; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .stat { background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 0.65rem; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }
  .progress-wrap { background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; height: 6px; }
  .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
  .progress-text { font-size: 0.72rem; color: #666; text-align: right; margin-top: 0.3rem; }
  .log-panel { display: flex; flex-direction: column; overflow: hidden; }
  .log-header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .log-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em; color: #888; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 0.5rem; }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .log { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; font-family: 'Courier New', monospace; font-size: 0.78rem; line-height: 1.8; display: flex; flex-direction: column; gap: 0.2rem; }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .log-line { display: flex; gap: 1rem; align-items: baseline; }
  .log-time { color: #444; min-width: 60px; font-size: 0.7rem; }
  .log-msg { color: #aaa; }
  .log-msg.ok { color: var(--green); }
  .log-msg.err { color: var(--red); }
  .log-msg.info { color: var(--gold); }
  .log-msg.dim { color: #555; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: #333; }
  .empty-state p { font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <h1>Blacklabel SEO</h1>
  <span>Description Generator</span>
</header>
<main>
  <div class="config">
    <div>
      <div class="section-label">Configuration API</div>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <div class="field">
          <label>Shopify Store URL</label>
          <input id="shopUrl" type="text" value="d15413-69.myshopify.com"/>
        </div>
        <div class="field">
          <label>Shopify Access Token</label>
          <input id="shopToken" type="password" placeholder="shpat_..."/>
        </div>
        <div class="field">
          <label>Anthropic API Key</label>
          <input id="anthropicKey" type="password" placeholder="sk-ant-..."/>
        </div>
      </div>
    </div>
    <hr class="divider"/>
    <div>
      <div class="section-label">Progression</div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">Traités</div></div>
        <div class="stat"><div class="stat-num" id="statOk">0</div><div class="stat-label">Succès</div></div>
        <div class="stat"><div class="stat-num" id="statErr">0</div><div class="stat-label">Erreurs</div></div>
      </div>
      <div style="margin-top:0.75rem;">
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </div>
    <hr class="divider"/>
    <button class="btn-start" id="btnStart" onclick="startProcess()">Lancer la génération</button>
    <button class="btn-stop" id="btnStop" onclick="stopProcess()">Arrêter</button>
  </div>
  <div class="log-panel">
    <div class="log-header">
      <h2><span class="status-dot" id="statusDot"></span>Live Log</h2>
      <span style="font-size:0.72rem;color:#444;" id="etaText"></span>
    </div>
    <div class="log" id="logContainer">
      <div class="empty-state" id="emptyState">
        <p>Configure tes clés et lance la génération</p>
      </div>
    </div>
  </div>
</main>
<script>
let stopRequested = false;
let doneCount = 0, okCount = 0, errCount = 0, totalCount = 0;
let startTime = null;

function log(msg, type = '') {
  const container = document.getElementById('logContainer');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const now = new Date().toTimeString().slice(0, 8);
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  container.appendChild(line);
  container.scrollTop = container.scrollHeight;
}

function updateStats() {
  document.getElementById('statTotal').textContent = totalCount || '—';
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statOk').textContent = okCount;
  document.getElementById('statErr').textContent = errCount;
  const pct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
  if (startTime && doneCount > 0) {
    const elapsed = (Date.now() - startTime) / 1000;
    const perItem = elapsed / doneCount;
    const remaining = (totalCount - doneCount) * perItem;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('etaText').textContent = `ETA ~${mins}m ${secs}s`;
  }
}

async function getAllProducts(store, token) {
  let products = [];
  let pageInfo = null;
  do {
    let url = `/api/products?store=${store}&token=${token}&limit=250`;
    if (pageInfo) url += `&page_info=${pageInfo}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`Erreur API produits: ${r.status}`);
    const data = await r.json();
    products = products.concat(data.products || []);
    pageInfo = data.nextPageInfo || null;
    totalCount = products.length;
    log(`${products.length} produits récupérés...`, 'dim');
    updateStats();
  } while (pageInfo);
  return products;
}

async function generateDescription(title, productType, tags, anthropicKey) {
  const tagsStr = Array.isArray(tags) ? tags.join(', ') : (tags || 'mode, sport');
  const prompt = `Tu es un expert en copywriting e-commerce SEO haut de gamme.
Produit : ${title}
Type : ${productType || 'Vetement / Accessoire'}
Tags : ${tagsStr}

Genere une fiche produit SEO complete en JSON :
{
  "fr": "<p>Description 150-200 mots en francais, SEO puissant, ton premium, mots-cles naturels, benefices, style, occasions.</p>",
  "en": "<p>150-200 word description in English, powerful SEO, premium tone, natural keywords, benefits, style, occasions.</p>"
}
Reponds UNIQUEMENT avec le JSON.`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!r.ok) throw new Error(`Anthropic error: ${r.status}`);
  const data = await r.json();
  let text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

async function updateProduct(store, token, id, descFr, descEn) {
  const bodyHtml = `${descFr}<hr/><p><em>${descEn}</em></p>`;
  const r = await fetch(`/api/update?store=${store}&token=${token}&id=${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ product: { id, body_html: bodyHtml } })
  });
  return r.ok;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startProcess() {
  const store = document.getElementById('shopUrl').value.trim();
  const token = document.getElementById('shopToken').value.trim();
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  if (!store || !token || !anthropicKey) { log('Remplis toutes les clés.', 'err'); return; }

  stopRequested = false;
  doneCount = 0; okCount = 0; errCount = 0; totalCount = 0;
  startTime = Date.now();

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('statusDot').classList.add('active');

  log('Connexion a Shopify...', 'info');

  try {
    const products = await getAllProducts(store, token);
    totalCount = products.length;
    log(`${totalCount} produits trouves. Demarrage...`, 'info');
    updateStats();

    for (let i = 0; i < products.length; i++) {
      if (stopRequested) { log('Arret demande.', 'err'); break; }
      const p = products[i];
      const title = p.title || 'Produit';
      const tags = p.tags ? p.tags.split(', ') : [];
      log(`[${i+1}/${totalCount}] ${title}`, 'dim');
      try {
        const descs = await generateDescription(title, p.product_type, tags, anthropicKey);
        const ok = await updateProduct(store, token, p.id, descs.fr, descs.en);
        if (ok) { okCount++; log(`✓ ${title}`, 'ok'); }
        else { errCount++; log(`✗ Shopify refuse — ${title}`, 'err'); }
      } catch(e) {
        errCount++;
        log(`✗ ${title} — ${e.message}`, 'err');
      }
      doneCount++;
      updateStats();
      await sleep(800);
    }
    log(`Termine — ${okCount} OK / ${errCount} erreurs`, 'info');
  } catch(e) {
    log(`Erreur critique : ${e.message}`, 'err');
  }

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('etaText').textContent = 'Termine';
}

function stopProcess() { stopRequested = true; log('Arret en cours...', 'err'); }
</script>
</body>
</html>

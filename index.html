<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blacklabel — SEO Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gold: #c9a84c;
    --gold-dim: #8a6e2e;
    --red: #e03333;
    --green: #2ecc71;
    --panel: #111111;
    --border: #222;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.15em;
    color: var(--white);
  }

  header span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold-dim);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    height: calc(100vh - 90px);
  }

  /* LEFT PANEL */
  .config {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field label {
    font-size: 0.78rem;
    color: #888;
    letter-spacing: 0.05em;
  }

  .field input {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--white);
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--gold-dim);
  }

  .field input::placeholder { color: #444; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  .btn-start {
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
  }

  .btn-start:hover { background: #d4b060; }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { background: #444; color: #777; cursor: not-allowed; }

  .btn-stop {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 0.75rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    width: 100%;
    display: none;
  }

  .btn-stop:hover { background: rgba(224,51,51,0.1); }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .stat {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    height: 6px;
  }

  .progress-bar {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 0.72rem;
    color: #666;
    text-align: right;
    margin-top: 0.3rem;
  }

  /* RIGHT PANEL — LOG */
  .log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: #888;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    display: inline-block;
    margin-right: 0.5rem;
  }

  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.78rem;
    line-height: 1.8;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .log-line { display: flex; gap: 1rem; align-items: baseline; }
  .log-time { color: #444; min-width: 60px; font-size: 0.7rem; }
  .log-msg { color: #aaa; }
  .log-msg.ok { color: var(--green); }
  .log-msg.err { color: var(--red); }
  .log-msg.info { color: var(--gold); }
  .log-msg.dim { color: #555; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: #333;
  }

  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.85rem; letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <h1>Blacklabel SEO</h1>
  <span>Description Generator</span>
</header>

<main>
  <!-- CONFIG -->
  <div class="config">
    <div>
      <div class="section-label">Configuration API</div>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <div class="field">
          <label>Shopify Store URL</label>
          <input id="shopUrl" type="text" placeholder="black-labelstore.myshopify.com"/>
        </div>
        <div class="field">
          <label>Shopify Access Token</label>
          <input id="shopToken" type="password" placeholder="shpat_..."/>
        </div>
        <div class="field">
          <label>Anthropic API Key</label>
          <input id="anthropicKey" type="password" placeholder="sk-ant-..."/>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <div>
      <div class="section-label">Progression</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="statTotal">—</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">Traités</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statOk">0</div>
          <div class="stat-label">Succès</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statErr">0</div>
          <div class="stat-label">Erreurs</div>
        </div>
      </div>
      <div style="margin-top:0.75rem;">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </div>

    <hr class="divider"/>

    <button class="btn-start" id="btnStart" onclick="startProcess()">
      Lancer la génération
    </button>
    <button class="btn-stop" id="btnStop" onclick="stopProcess()">
      Arrêter
    </button>
  </div>

  <!-- LOG -->
  <div class="log-panel">
    <div class="log-header">
      <h2><span class="status-dot" id="statusDot"></span>Live Log</h2>
      <span style="font-size:0.72rem;color:#444;" id="etaText"></span>
    </div>
    <div class="log" id="logContainer">
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>Configure tes clés et lance la génération</p>
      </div>
    </div>
  </div>
</main>

<script>
let running = false;
let stopRequested = false;
let doneCount = 0;
let okCount = 0;
let errCount = 0;
let totalCount = 0;
let startTime = null;

function log(msg, type = '') {
  const container = document.getElementById('logContainer');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const now = new Date();
  const time = now.toTimeString().slice(0, 8);

  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
  container.appendChild(line);
  container.scrollTop = container.scrollHeight;
}

function updateStats() {
  document.getElementById('statTotal').textContent = totalCount || '—';
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statOk').textContent = okCount;
  document.getElementById('statErr').textContent = errCount;

  const pct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';

  if (startTime && doneCount > 0) {
    const elapsed = (Date.now() - startTime) / 1000;
    const perItem = elapsed / doneCount;
    const remaining = (totalCount - doneCount) * perItem;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('etaText').textContent = `ETA ~${mins}m ${secs}s`;
  }
}

async function getAllProducts(storeUrl, token) {
  let products = [];
  let url = `https://${storeUrl}/admin/api/2026-04/products.json?limit=250`;

  while (url) {
    const r = await fetch(url, {
      headers: { 'X-Shopify-Access-Token': token }
    });

    if (!r.ok) throw new Error(`Shopify API error: ${r.status}`);
    const data = await r.json();
    products = products.concat(data.products || []);

    const link = r.headers.get('Link') || '';
    url = null;
    if (link.includes('rel="next"')) {
      const match = link.match(/<([^>]+)>;\s*rel="next"/);
      if (match) url = match[1];
    }

    log(`${products.length} produits récupérés...`, 'dim');
    totalCount = products.length;
    updateStats();
  }

  return products;
}

async function generateDescription(title, productType, tags, anthropicKey) {
  const tagsStr = Array.isArray(tags) ? tags.join(', ') : (tags || 'mode, luxe');
  const prompt = `Tu es un expert en copywriting e-commerce SEO haut de gamme.

Produit : ${title}
Type : ${productType || 'Vetement / Accessoire'}
Tags : ${tagsStr}

Genere une fiche produit SEO complete en JSON avec exactement cette structure :
{
  "fr": "<p>Description detaillee en francais, 150-200 mots, SEO puissant, ton luxe premium.</p>",
  "en": "<p>Detailed description in English, 150-200 words, powerful SEO, luxury premium tone.</p>"
}

Reponds UNIQUEMENT avec le JSON, rien d'autre.`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': anthropicKey,
      'anthropic-version': '2023-06-01',
      'Content-Type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!r.ok) throw new Error(`Anthropic API error: ${r.status}`);
  const data = await r.json();
  let text = data.content[0].text.trim();
  text = text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

async function updateProduct(storeUrl, token, productId, descFr, descEn) {
  const bodyHtml = `${descFr}<hr/><p><em>${descEn}</em></p>`;
  const r = await fetch(`https://${storeUrl}/admin/api/2026-04/products/${productId}.json`, {
    method: 'PUT',
    headers: {
      'X-Shopify-Access-Token': token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ product: { id: productId, body_html: bodyHtml } })
  });
  return r.ok;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startProcess() {
  const storeUrl = document.getElementById('shopUrl').value.trim();
  const shopToken = document.getElementById('shopToken').value.trim();
  const anthropicKey = document.getElementById('anthropicKey').value.trim();

  if (!storeUrl || !shopToken || !anthropicKey) {
    log('Remplis toutes les clés avant de lancer.', 'err');
    return;
  }

  running = true;
  stopRequested = false;
  doneCount = 0; okCount = 0; errCount = 0; totalCount = 0;
  startTime = Date.now();

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('statusDot').classList.add('active');

  log('Connexion à Shopify...', 'info');

  try {
    const products = await getAllProducts(storeUrl, shopToken);
    totalCount = products.length;
    log(`${totalCount} produits trouvés. Démarrage...`, 'info');
    updateStats();

    for (let i = 0; i < products.length; i++) {
      if (stopRequested) {
        log('Arrêt demandé.', 'err');
        break;
      }

      const p = products[i];
      const title = p.title || 'Produit';
      const tags = p.tags ? p.tags.split(', ') : [];

      log(`[${i+1}/${totalCount}] ${title}`, '');

      try {
        const descs = await generateDescription(title, p.product_type, tags, anthropicKey);
        const ok = await updateProduct(storeUrl, shopToken, p.id, descs.fr, descs.en);

        if (ok) {
          okCount++;
          log(`✓ ${title}`, 'ok');
        } else {
          errCount++;
          log(`✗ Shopify refusé — ${title}`, 'err');
        }
      } catch (e) {
        errCount++;
        log(`✗ Erreur — ${e.message}`, 'err');
      }

      doneCount++;
      updateStats();
      await sleep(1200);
    }

    log(`Terminé — ${okCount} OK / ${errCount} erreurs`, 'info');

  } catch (e) {
    log(`Erreur critique : ${e.message}`, 'err');
  }

  running = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('etaText').textContent = 'Terminé';
}

function stopProcess() {
  stopRequested = true;
  log('Arrêt en cours...', 'err');
}
</script>
</body>
</html>
